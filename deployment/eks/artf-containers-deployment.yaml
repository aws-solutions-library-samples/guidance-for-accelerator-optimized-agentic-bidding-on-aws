---
# HPA for ARTF agent containers — scale on CPU utilization under load
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dlrm-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dlrm-bid-shader
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: widedeep-hpa
spec:
