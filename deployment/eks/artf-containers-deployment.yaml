# ARTF container deployments.
#
# This guidance has four NVIDIA containers. The three GPU-backed model
# containers (DLRM, Wide&Deep, NCF) run on GPU nodes alongside Triton for
# minimal inference latency. The fourth container, the Metrics Enricher, is
# rule-based and runs on CPU nodes (no GPU dependency).
#
# Architecture:
#   [GPU model container (GPU node)] --tritonclient.http--> [Triton Server (same node)]
#   [Metrics Enricher (CPU node)] -- rule-based, no Triton -->

---
# DLRM Bid Shader — runs on GPU node for co-location with Triton
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlrm-bid-shader
  labels:
    app: artf
    model: dlrm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: artf
      model: dlrm
  template:
    metadata:
      labels:
        app: artf
        model: dlrm
    spec:
      nodeSelector:
        role: inference
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: dlrm
          image: __REGISTRY__/__STACK_NAME__-dlrm-bid-shader:__IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: mcp
            - containerPort: 8080
              name: health
            - containerPort: 50051
              name: grpc
          env:
            - name: TRITON_URL
              value: "triton-inference-server:8000"
            - name: USE_TRITON
              value: "true"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: dlrm-bid-shader
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      name: mcp
    - port: 8080
      targetPort: 8080
      name: health
    - port: 50051
      targetPort: 50051
      name: grpc
  selector:
    app: artf
    model: dlrm

