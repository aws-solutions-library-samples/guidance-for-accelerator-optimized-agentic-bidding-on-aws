edition = "2023";

package com.iabtechlab.bidstream.mutation.v1;

import "com/iabtechlab/openrtb/v2.6/openrtb.proto";

// ------------------------------------------------------------------------
// Request / response envelope exchanged with an ARTF extension point.
// ------------------------------------------------------------------------

// Payload an exchange sends to an extension point at a given auction stage.
message RTBRequest {
  // Auction lifecycle stage at which mutations are being solicited.
  Lifecycle lifecycle = 1;

  // Exchange-assigned identifier used to correlate this request with its
  // response. Need not be unique across recipients.
  string id = 2;

  // Upper bound, in milliseconds, the exchange will wait for mutations
  // (including network latency) before treating the call as timed out.
  int32 tmax = 3;

  // The OpenRTB bid request under consideration.
  com.iabtechlab.openrtb.v2.BidRequest bid_request = 4;

  // The OpenRTB bid response under consideration, when applicable.
  com.iabtechlab.openrtb.v2.BidResponse bid_response = 5;

  // The entity that owns the enclosed bid request or bid response.
  Originator originator = 6;

  // Intents the responder is permitted to return for this request.
  repeated Intent applicable_intents = 7;

  // Reserved extension envelope.
  Ext ext = 99;

  message Ext {
    extensions 500 to max;
  }
}

// Auction lifecycle stages at which an extension point may be invoked.
enum Lifecycle {
  LIFECYCLE_UNSPECIFIED = 0;

  // Invoked against a publisher-originated bid request.
  LIFECYCLE_PUBLISHER_BID_REQUEST = 1;

  // Invoked against a DSP-originated bid response.
  LIFECYCLE_DSP_BID_RESPONSE = 2;
}

// Set of mutations returned by an extension point for a given request.
message RTBResponse {
  // Echoes RTBRequest.id so the exchange can correlate the response.
  string id = 1;

  // Proposed changes for the exchange to apply.
  repeated Mutation mutations = 2;

  // Optional descriptive metadata about how the response was produced.
  Metadata metadata = 3;
}

// The business entity responsible for the enclosed request/response.
message Originator {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_PUBLISHER = 1;
    TYPE_SSP = 2;
    TYPE_EXCHANGE = 3;
    TYPE_DSP = 4;
  }

  Type type = 1;
  string id = 2;
}

// ------------------------------------------------------------------------
// Mutations.
// ------------------------------------------------------------------------

// A single proposed change to the bidstream.
message Mutation {
  // What the mutation is intended to accomplish.
  Intent intent = 1;

  // How the change is applied to the target (add / remove / replace).
  Operation op = 2;

  // Business-domain location the operation targets.
  string path = 3;

  // Intent-specific payload. Tags at 100+ are reserved per payload type.
  oneof value {
    // A list of opaque string identifiers (segments, deals, content IDs).
    IDsPayload ids = 100;

    // Adjustments to a specific deal's economics.
    AdjustDealPayload adjust_deal = 101;

    // Adjustment to a bid price.
    AdjustBidPayload adjust_bid = 102;

    // Quality or telemetry metrics to attach.
    MetricsPayload metrics = 103;

    // Content data to attach.
    DataPayload content_data = 104;
  }

  // Reserved for experimental or test payloads.
  reserved 1000 to 1999;
}

// The kind of change an operation performs on the target data.
enum Operation {
  OPERATION_UNSPECIFIED = 0;
  OPERATION_ADD = 1;
  OPERATION_REMOVE = 2;
  OPERATION_REPLACE = 3;
}

// The purpose of a mutation. Determines which oneof payload is expected.
enum Intent {
  INTENT_UNSPECIFIED = 0;

  // Activate audience segments by external segment ID.
  ACTIVATE_SEGMENTS = 1;

  // Activate deals by external deal ID.
  ACTIVATE_DEALS = 2;

  // Suppress deals by external deal ID.
  SUPPRESS_DEALS = 3;

  // Adjust the bid floor of a specific deal.
  ADJUST_DEAL_FLOOR = 4;

  // Adjust the margin of a specific deal.
  ADJUST_DEAL_MARGIN = 5;

  // Shade (adjust) the price of a specific bid.
  BID_SHADE = 6;

  // Attach metrics to an impression.
  ADD_METRICS = 7;

  // Attach extended content identifiers.
  ADD_CIDS = 8;

  // Reserved for experimental or test intents.
  reserved 1000 to 1999;
}

// Descriptive metadata about the responder and the model used, if any.
message Metadata {
  // Version of the responder's API.
  string api_version = 1;

  // Version of the model used to compute the mutation, when applicable.
  string model_version = 2;
}

// ------------------------------------------------------------------------
// Mutation payloads.
// ------------------------------------------------------------------------

// A list of identifiers; the meaning is determined by the mutation's intent.
message IDsPayload {
  repeated string id = 1;
}

// Adjustments to the economics of a deal.
message AdjustDealPayload {
  // Suggested bid floor for the deal.
  double bidfloor = 1;

  // Suggested margin for the deal.
  Margin margin = 2;
}

// A margin value and how it should be interpreted.
message Margin {
  // The margin amount.
  double value = 1;

  enum CalculationType {
    // Absolute adjustment expressed as CPM.
    CPM = 0;

    // Relative adjustment expressed as a percentage.
    PERCENT = 1;
  }

  CalculationType calculation_type = 2;
}

// An adjusted bid price.
message AdjustBidPayload {
  double price = 1;
}

// Metrics to add, reusing the OpenRTB impression Metric type
// (nested under BidRequest.Imp in the OpenRTB schema).
message MetricsPayload {
  repeated com.iabtechlab.openrtb.v2.BidRequest.Imp.Metric metric = 1;
}

// Content data to add, reusing the OpenRTB Data type.
message DataPayload {
  repeated com.iabtechlab.openrtb.v2.BidRequest.Data data = 1;
}
