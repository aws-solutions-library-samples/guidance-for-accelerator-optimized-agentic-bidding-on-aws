syntax = "proto3";

package com.iabtechlab.bidstream.mutation.services.v1;

import "agenticrtbframework.proto";

// The extension point an exchange calls to obtain bidstream mutations.
service RTBExtensionPoint {
  // Returns the mutations to apply for the given auction lifecycle event.
  rpc GetMutations (com.iabtechlab.bidstream.mutation.v1.RTBRequest)
      returns (com.iabtechlab.bidstream.mutation.v1.RTBResponse);
}
